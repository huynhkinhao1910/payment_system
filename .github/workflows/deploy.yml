name: Deploy

on:
  push:
    branches: [master]
  # Deploy an already-green master by hand, e.g. after a server rebuild.
  workflow_dispatch:

# A second merge while the first is mid-rsync would race it onto the same
# directory. Queue instead of cancelling — a half-copied dist is a broken site.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm test
      # `npm run build` is `tsc -b && vite build`, so this is the typecheck gate too.
      - run: npm run build

      - name: Deploy dist to server
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          # SSH_HOST phải là IP origin, không phải codetoolkit.org — domain đang
          # sau Cloudflare, SSH tới đó không chạm được server.
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          # Pinned, not ssh-keyscan'd: scanning trusts whatever answers on the
          # first connect, which is the one moment a MITM would be waiting.
          echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          # --delete drops the previous build's hashed assets. Safe only because
          # nginx's root is this directory and nothing else writes to it.
          rsync -az --delete -e "ssh -i ~/.ssh/id_deploy -p $SSH_PORT" \
            dist/ "$SSH_USER@$SSH_HOST:/var/www/payment_system/dist/"
